<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2d5a87"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#f59e0b" stroke-width="4"/>

  <!-- Road/path -->
  <path d="M 120 380 Q 180 300 256 280 Q 332 260 392 180"
        stroke="url(#road)" stroke-width="18" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 120 380 Q 180 300 256 280 Q 332 260 392 180"
        stroke="#f59e0b" stroke-width="8" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        stroke-dasharray="4,16"/>

  <!-- Ecuador flag stripes at top -->
  <rect x="156" y="60" width="200" height="8" rx="4" fill="#fdd017"/>
  <rect x="156" y="72" width="200" height="8" rx="4" fill="#003893"/>
  <rect x="156" y="84" width="200" height="8" rx="4" fill="#ce1126"/>

  <!-- Location pin -->
  <g transform="translate(360, 130)">
    <path d="M 25 0 C 11.2 0 0 11.2 0 25 C 0 44 25 65 25 65 C 25 65 50 44 50 25 C 50 11.2 38.8 0 25 0 Z"
          fill="#ef4444" stroke="#fff" stroke-width="2"/>
    <circle cx="25" cy="22" r="10" fill="#fff"/>
  </g>

  <!-- Bot icon (gear) -->
  <g transform="translate(80, 120)" opacity="0.6">
    <circle cx="20" cy="20" r="8" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M 20 4 L 20 8 M 20 32 L 20 36 M 4 20 L 8 20 M 32 20 L 36 20 M 8.7 8.7 L 11.5 11.5 M 28.5 28.5 L 31.3 31.3 M 31.3 8.7 L 28.5 11.5 M 11.5 28.5 L 8.7 31.3"
          stroke="#fff" stroke-width="2"/>
  </g>

  <!-- Text: ECU -->
  <text x="256" y="200" text-anchor="middle"
        font-family="Georgia, serif" font-size="72" font-weight="bold"
        fill="#f59e0b" stroke="#1a365d" stroke-width="1">
    ECU
  </text>

  <!-- Text: VÍAS -->
  <text x="256" y="270" text-anchor="middle"
        font-family="Georgia, serif" font-size="52" font-weight="bold"
        fill="#ffffff">
    VÍAS
  </text>

  <!-- Subtitle -->
  <text x="256" y="310" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="16"
        fill="#94a3b8" letter-spacing="3">
    ESTADO DE VÍAS ECUADOR
  </text>

  <!-- Bot badge -->
  <rect x="195" y="340" width="122" height="28" rx="14" fill="#f59e0b"/>
  <text x="256" y="359" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#1a365d">
    TELEGRAM BOT
  </text>

  <!-- Decorative dots -->
  <circle cx="100" cy="420" r="4" fill="#f59e0b" opacity="0.4"/>
  <circle cx="120" cy="430" r="3" fill="#f59e0b" opacity="0.3"/>
  <circle cx="390" cy="420" r="4" fill="#f59e0b" opacity="0.4"/>
  <circle cx="410" cy="430" r="3" fill="#f59e0b" opacity="0.3"/>

  <!-- Version badge -->
  <text x="256" y="480" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="11"
        fill="#64748b">
    v1.0.0
  </text>
</svg>
