<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)" rx="0"/>

  <!-- Decorative circles -->
  <circle cx="580" cy="50" r="80" fill="#f59e0b" opacity="0.08"/>
  <circle cx="60" cy="310" r="120" fill="#f59e0b" opacity="0.05"/>

  <!-- Ecuador flag bar -->
  <rect x="0" y="0" width="640" height="6" fill="#fdd017"/>
  <rect x="0" y="6" width="640" height="6" fill="#003893"/>
  <rect x="0" y="12" width="640" height="6" fill="#ce1126"/>

  <!-- Road graphic -->
  <path d="M 0 280 Q 160 260 320 240 Q 480 220 640 200"
        stroke="#f59e0b" stroke-width="12" fill="none"
        stroke-linecap="round" opacity="0.3"/>
  <path d="M 0 280 Q 160 260 320 240 Q 480 220 640 200"
        stroke="#ffffff" stroke-width="2" fill="none"
        stroke-linecap="round" stroke-dasharray="8,12" opacity="0.4"/>

  <!-- Location pin icon -->
  <g transform="translate(60, 100)">
    <path d="M 30 0 C 13.4 0 0 13.4 0 30 C 0 52.5 30 75 30 75 C 30 75 60 52.5 60 30 C 60 13.4 46.6 0 30 0 Z"
          fill="#ef4444" stroke="#fff" stroke-width="2"/>
    <circle cx="30" cy="27" r="12" fill="#fff"/>
  </g>

  <!-- Main text -->
  <text x="140" y="155" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#f59e0b">
    ECU
  </text>
  <text x="140" y="155" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#f59e0b"
        stroke="#1a365d" stroke-width="0.5" opacity="0.5">
    ECU
  </text>

  <text x="310" y="155" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#ffffff">
    VÍAS
  </text>

  <!-- Subtitle -->
  <text x="140" y="195" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8" letter-spacing="4">
    ESTADO DE VÍAS ECUADOR
  </text>

  <!-- Description -->
  <text x="140" y="235" font-family="Arial, sans-serif" font-size="14" fill="#cbd5e1">
    Consulta en tiempo real el estado de las vías
  </text>
  <text x="140" y="258" font-family="Arial, sans-serif" font-size="14" fill="#cbd5e1">
    de Ecuador. Suscríbete para recibir alertas
  </text>
  <text x="140" y="281" font-family="Arial, sans-serif" de font-size="14" fill="#cbd5e1">
    de cambios en las rutas de tu interés.
  </text>

  <!-- CTA badge -->
  <rect x="140" y="310" width="180" height="32" rx="16" fill="#f59e0b"/>
  <text x="230" y="331" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="13" font-weight="bold"
        fill="#1a365d">
    🛣️ CONSULTAR AHORA
  </text>

  <!-- Province list (right side) -->
  <g transform="translate(400, 80)" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">
    <text y="0">📍 Azuay</text>
    <text y="22">📍 Bolívar</text>
    <text y="44">📍 Cañar</text>
    <text y="66">📍 Chimborazo</text>
    <text y="88">📍 El Oro</text>
    <text y="110">📍 Esmeraldas</text>
    <text y="132">📍 Loja</text>
    <text y="154">📍 Manabí</text>
    <text y="176">📍 Morona Santiago</text>
    <text y="198">📍 Napo</text>
    <text y="220">📍 Y más...</text>
  </g>

  <!-- Bot badge -->
  <rect x="500" y="310" width="130" height="32" rx="16" fill="rgba(255,255,255,0.1)" stroke="#f59e0b" stroke-width="1"/>
  <text x="565" y="331" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="12" font-weight="bold"
        fill="#f59e0b">
    TELEGRAM BOT
  </text>

  <!-- Version -->
  <text x="620" y="352" text-anchor="end"
        font-family="Arial, sans-serif" font-size="10" fill="#64748b">
    v1.0.0
  </text>
</svg>
